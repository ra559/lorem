<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Lorem Ipsum Generator</title>

  <!-- Bulma -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">

  <!-- Open source font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap"
        rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<section class="section">
<div class="container">

<div class="columns is-centered">

<div class="column is-10-tablet is-8-desktop">

<div class="card app-card">

<div class="card-content">

<div class="level mb-5">

<div class="level-left">
<div>
<h1 class="title is-3">
Lorem Ipsum Generator
</h1>

<p class="subtitle is-6">
Generate placeholder content in plain text, markdown, or HTML
</p>
</div>
</div>

<div class="level-right">
<button
class="button is-small"
id="themeBtn">

🌙 Theme
</button>
</div>

</div>


<div class="columns is-multiline">

<div class="column is-12-mobile is-4">

<div class="field">
<label class="label">Generate by</label>

<div class="control">
<div class="select is-fullwidth">

<select id="generateType">
<option value="paragraphs">Paragraphs</option>
<option value="sentences">Sentences</option>
<option value="words">Words</option>
</select>

</div>
</div>
</div>

</div>


<div class="column is-12-mobile is-4">

<div class="field">
<label class="label">Amount</label>

<div class="control">
<input
id="amount"
class="input"
type="number"
min="1"
max="100"
value="3">
</div>

</div>

</div>


<div class="column is-12-mobile is-4">

<div class="field">
<label class="label">Output Format</label>

<div class="buttons">

<button
class="button format-btn is-link is-light active"
data-format="text">

Text
</button>

<button
class="button format-btn"
data-format="markdown">

Markdown
</button>

<button
class="button format-btn"
data-format="html">

HTML
</button>

</div>

</div>

</div>

</div>


<div class="buttons mt-4">

<button
id="generateBtn"
class="button is-primary">

Generate
</button>

<button
id="copyBtn"
class="button is-info">

Copy
</button>

</div>


<div class="field mt-5">

<label class="label">
Generated Output
</label>

<div class="control">

<textarea
id="output"
class="textarea"
rows="14"
readonly>
</textarea>

</div>

</div>

</div>
</div>

</div>
</div>
</div>

</section>

<script src="app.js"></script>

</td>	


</body>
</html>
